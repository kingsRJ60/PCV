name: Build PCV Release APK

on:
  workflow_dispatch:    # run manually when you are ready to release
  push:
    tags:
      - 'v*'           # also runs when you push a tag like v1.0.0

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew

      - name: Strip BOM from Kotlin files
        run: |
          find . -name "*.kt" | while read f; do
            sed -i '1s/^\xEF\xBB\xBF//' "$f"
          done

      - name: Bundle source files into assets
        run: |
          ASSET_DIR="app/src/main/assets/source"
          mkdir -p "$ASSET_DIR"
          SRC="app/src/main/java/com/pcv/app"
          cp "$SRC/service/MediaSupervisorService.kt"   "$ASSET_DIR/"
          cp "$SRC/media/ExoPlayerManager.kt"           "$ASSET_DIR/"
          cp "$SRC/media/OverlayManager.kt"             "$ASSET_DIR/"
          cp "$SRC/scheduler/MediaScheduler.kt"         "$ASSET_DIR/"
          cp "$SRC/codelab/CodeImprovementEngine.kt"    "$ASSET_DIR/"
          cp "$SRC/data/MediaModels.kt"                 "$ASSET_DIR/"
          cp "$SRC/MainActivity.kt"                     "$ASSET_DIR/"
          cp "$SRC/Navigation.kt"                       "$ASSET_DIR/"
          cp "$SRC/ui/screens/HomeScreen.kt"            "$ASSET_DIR/"
          cp "$SRC/ui/screens/AudioScreen.kt"           "$ASSET_DIR/"
          cp "$SRC/ui/screens/VideoScreen.kt"           "$ASSET_DIR/"
          cp "$SRC/ui/screens/AdsScreen.kt"             "$ASSET_DIR/"
          cp "$SRC/ui/screens/SchedulerScreen.kt"       "$ASSET_DIR/"
          cp "$SRC/ui/screens/CodeLabScreen.kt"         "$ASSET_DIR/"
          cp "$SRC/ui/screens/SharedComponents.kt"      "$ASSET_DIR/"
          cp "$SRC/ui/theme/Theme.kt"                   "$ASSET_DIR/"

      # ── Decode the keystore from GitHub Secrets ────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          echo "KEYSTORE_PATH=keystore.jks" >> $GITHUB_ENV

      # ── Build signed release APK ───────────────────────────────────────────
      - name: Build release APK
        env:
          KEYSTORE_PATH:     keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: List release APKs
        run: find . -path "*/release/*.apk" | sort

      - name: Upload universal release APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: PCV-release-universal
          path: app/build/outputs/apk/release/app-universal-release.apk
          if-no-files-found: warn

      - name: Upload arm64 release APK (most phones)
        uses: actions/upload-artifact@v4.6.2
        with:
          name: PCV-release-arm64
          path: app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: warn
