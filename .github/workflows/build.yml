name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Set up JDK 17
      uses: actions/setup-java@v4.7.1
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Android environment
      uses: android-actions/setup-android@v3.2.2

    # CRITICAL FIX 1: Removes invisible bytes causing "Syntax error line 1"
    - name: Strip BOM characters
      run: |
        find . -name "*.kt" | while read f; do
          sed -i '1s/^\xEF\xBB\xBF//' "$f"
        done

    # CRITICAL FIX 2: Copies .kt files so the AI Code Lab has files to analyze
    - name: Bundle Code Lab assets
      run: |
        mkdir -p app/src/main/assets/source/
        find app/src/main/java/com/pcv/app -name "*.kt" -exec cp {} app/src/main/assets/source/ \;

    # CRITICAL FIX 3: Ensures Gradle wrapper exists and is executable
    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.9

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # CRITICAL FIX 4: Explicitly locates the APK to prevent silent upload failures
    - name: Find and Stage APK
      run: |
        mkdir -p staging
        find . -name "*.apk" -exec cp {} staging/ \;

    - name: Upload APK
      uses: actions/upload-artifact@v4.6.2
      with:
        name: PCV-debug-apk
        path: staging/*.apk
        if-no-files-found: error
