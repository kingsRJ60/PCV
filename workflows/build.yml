name: Build PCV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew

      - name: Strip BOM characters from all Kotlin files
        run: |
          find . -name "*.kt" | while read f; do
            sed -i '1s/^\xEF\xBB\xBF//' "$f"
          done
          echo "BOM stripping complete"

      # ── AUTO-COPY SOURCE FILES INTO ASSETS FOR CODE LAB ──────────────────
      - name: Bundle source files into assets for Code Lab
        run: |
          ASSET_DIR="app/src/main/assets/source"
          mkdir -p "$ASSET_DIR"
          SRC="app/src/main/java/com/pcv/app"

          cp "$SRC/service/MediaSupervisorService.kt"   "$ASSET_DIR/"
          cp "$SRC/media/ExoPlayerManager.kt"           "$ASSET_DIR/"
          cp "$SRC/media/OverlayManager.kt"             "$ASSET_DIR/"
          cp "$SRC/scheduler/MediaScheduler.kt"         "$ASSET_DIR/"
          cp "$SRC/codelab/CodeImprovementEngine.kt"    "$ASSET_DIR/"
          cp "$SRC/data/MediaModels.kt"                 "$ASSET_DIR/"
          cp "$SRC/MainActivity.kt"                     "$ASSET_DIR/"
          cp "$SRC/Navigation.kt"                       "$ASSET_DIR/"
          cp "$SRC/ui/screens/HomeScreen.kt"            "$ASSET_DIR/"
          cp "$SRC/ui/screens/AudioScreen.kt"           "$ASSET_DIR/"
          cp "$SRC/ui/screens/VideoScreen.kt"           "$ASSET_DIR/"
          cp "$SRC/ui/screens/AdsScreen.kt"             "$ASSET_DIR/"
          cp "$SRC/ui/screens/SchedulerScreen.kt"       "$ASSET_DIR/"
          cp "$SRC/ui/screens/CodeLabScreen.kt"         "$ASSET_DIR/"
          cp "$SRC/ui/screens/SharedComponents.kt"      "$ASSET_DIR/"
          cp "$SRC/ui/theme/Theme.kt"                   "$ASSET_DIR/"

          echo "=== Assets bundled ==="
          ls -la "$ASSET_DIR"

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Confirm APK location
        run: |
          echo "=== APK files found ==="
          find . -name "*.apk" 2>/dev/null | sort

      - name: Upload debug APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: PCV-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
